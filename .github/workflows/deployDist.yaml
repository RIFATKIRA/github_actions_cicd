name: Greeting
on: [push, workflow_dispatch]
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@4
        # run: |
        #   echo "cloning repo.."
        #   echo "${{ toJson(github) }}"
        #   git clone https://github.com/${{ github.repository }}.git
      - name: Install node
        uses: actions/setup-node@4
        with:
          node-version: 20
      - name: Print node version
        run: node -v
      - name: Install Dependencies
        run: npm ci
      - name: Run test
        run: npm run test 
