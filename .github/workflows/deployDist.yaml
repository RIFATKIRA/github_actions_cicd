name: Greeting
on: [push, workflow_dispatch]
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4   # ✅ add 'v'

      - name: Install node
        uses: actions/setup-node@v4  # ✅ add 'v'
        with:
          node-version: 20

      - name: Print node version
        run: node -v

      - name: Install Dependencies
        run: npm ci

      - name: Run test
        run: npm run test