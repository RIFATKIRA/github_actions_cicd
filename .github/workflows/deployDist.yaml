name: Greeting2
on: [push, workflow_dispatch]
jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4   # ✅ add 'v'

      - name: Install node
        uses: actions/setup-node@v4  # ✅ add 'v'
        with:
          node-version: 20

      - name: Print node version
        run: node -v

      - name: Cache file
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Install Dependencies
        run: npm ci

      - name: Run test
        run: npm run test

  deploy:
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4   # ✅ add 'v'

      - name: Install node
        uses: actions/setup-node@v4  # ✅ add 'v'
        with:
          node-version: 20

      - name: Print node version
        run: node -v

      - name: Cache file
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build 
      
      - name: Deploy
        run: echo "Successfully deploied"