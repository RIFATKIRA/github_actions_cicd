name: Greeting2
on: [push, workflow_dispatch]

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Print Node version
        run: node -v

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          # Use package-lock.json for cache key (not "lockfiles")
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  Build:
    needs: Test
    runs-on: ubuntu-latest    # ✅ lowercase 'u'
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Print Node version
        run: node -v

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # ✅ Use the dedicated Pages artifact uploader
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # your build output directory

  deploy:
    needs: Build
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment origin
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4